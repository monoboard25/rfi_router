name: Deploy Monoboard Agents

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - monoboard9476-validator
          - monoboard9476-rfi-router
          - monoboard9476-change-order
          - monoboard9476-daily-report
          - monoboard9476-ceo-agent
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/${{ matrix.app }}/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - monoboard9476-validator
          - monoboard9476-rfi-router
          - monoboard9476-change-order
          - monoboard9476-daily-report
          - monoboard9476-ceo-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build deployment package
        working-directory: apps/${{ matrix.app }}
        run: |
          python -m pip install --upgrade pip
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ matrix.app }}
          package: apps/${{ matrix.app }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
