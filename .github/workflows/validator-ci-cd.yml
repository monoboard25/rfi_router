name: Validator Chain CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'validator/**'
      - 'schemas/**'
      - '.github/workflows/validator-ci-cd.yml'
  pull_request:
    paths:
      - 'validator/**'
      - 'schemas/**'
      - '.github/workflows/validator-ci-cd.yml'

env:
  AZURE_FUNCTIONAPP_NAME: 'monoboard9476-validator'
  PYTHON_VERSION: '3.11'
  FUNCTION_DIR: 'validator'

permissions:
  id-token: write # Required for requesting the JWT for OIDC
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Dependencies
        working-directory: ${{ env.FUNCTION_DIR }}
        run: uv sync

      - name: Run Pytest
        working-directory: ${{ env.FUNCTION_DIR }}
        run: uv run pytest
        
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Resolve Project Dependencies
        working-directory: ${{ env.FUNCTION_DIR }}
        run: uv export --format requirements-txt > requirements.txt
          
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.FUNCTION_DIR }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
