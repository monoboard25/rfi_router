name: Dashboard CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-ci-cd.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-ci-cd.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  id-token: write
  contents: read
  pull-requests: write  # SWA posts preview URL as a PR comment

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard        # static files root
          api_location: dashboard/api    # Azure Functions — npm install runs automatically
          output_location: ""            # no build step (vanilla HTML)
          skip_app_build: true

  close_pull_request:
    name: Close PR Staging Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Delete PR preview environment
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
